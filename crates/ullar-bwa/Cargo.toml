regex = "1.12.2"
serde = { version = "1.0.228", features = ["derive"] }
ullar = { version = "0.4.1", path = "../ullar" }
ullar-fastq = { version = "0.1.0", path = "../ullar-fastq" }
which = "8.0.0"
